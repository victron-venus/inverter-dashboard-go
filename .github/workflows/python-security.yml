name: Python Security Scan

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 5 * * 2'

jobs:
  python-security:
    if: hashFiles('**/*.py') != ''
    name: Python Security
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install security tools
      run: |
        pip install bandit safety

    - name: Run Bandit security linter
      run: |
        bandit -r . -f sarif -o bandit-results.sarif || true
        # Always create SARIF file even if bandit finds no issues
        if [ ! -f bandit-results.sarif ]; then
          echo '{"version":"2.1.0","$schema":"https://raw.githubusercontent.com/oasis-tcs/sarif-spec/master/sarif-2.1.0-obj.json","runs":[]}' > bandit-results.sarif
        fi

    - name: Upload Bandit results
      uses: github/codeql-action/upload-sarif@v4
      if: always()
