version: '3.8'

services:
  dashboard:
    image: alvit/inverter-dashboard:latest
    build: .
    ports:
      - "8080:8080"
    environment:
      - MQTT_HOST=192.168.160.150
      - MQTT_PORT=1883
      - WEB_PORT=8080
    volumes:
      # Mount config directory for config.yaml (read-only)
      - /volume1/docker/inverter-dashboard/config:/app/config:ro
    restart: unless-stopped
